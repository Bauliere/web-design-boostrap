<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contáctanos</title>

    <!-- Favicon -->
    <link rel="icon" type="image/jepg" href="assets/img/nocall.jpeg" />

    <!-- Bootstrap 5 CSS -->
    
<!-- <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
      rel="stylesheet"
    /> -->

    <link rel="stylesheet" href="./assets/css/bootstrap.min.css">
    <!-- Font Awesome 6 -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      rel="stylesheet"
    />

    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body>

    <!-- Contenido principal -->
    <main class="main-wrapper d-flex align-items-center justify-content-center">
      <div class="container py-5">
        <h2 class="text-center fw-semibold mb-4 page-title">Contáctanos!</h2>

        <div class="form-card mx-auto">
          <form novalidate>

            <!-- Nombre completo -->
            <div class="mb-3">
              <label for="nombre" class="form-label fw-semibold">Nombre completo</label>
              <div class="input-group">
                <span class="input-group-text">
                  <i class="fa-solid fa-user"></i>
                </span>
                <input
                  type="text"
                  class="form-control"
                  id="nombre"
                  placeholder="Ej: Fausto"
                />
              </div>
            </div>

            <!-- Correo Electrónico -->
            <div class="mb-3">
              <label for="correo" class="form-label fw-semibold">Correo Electronico</label>
              <div class="input-group">
                <span class="input-group-text">
                  <i class="fa-regular fa-envelope"></i>
                </span>
                <input
                  type="email"
                  class="form-control"
                  id="correo"
                  placeholder="Ej: SickStim@gmail.com"
                />
              </div>
            </div>

            <!-- Teléfono -->
            <div class="mb-3">
              <label for="telefono" class="form-label fw-semibold">Telefono</label>
              <div class="input-group">
                <span class="input-group-text">
                  <i class="fa-solid fa-phone"></i>
                </span>
                <input
                  type="tel"
                  class="form-control"
                  id="telefono"
                  placeholder="Ej: 771 198 3750"
                />
              </div>
            </div>

            <!-- Asunto -->
            <div class="mb-3">
              <label for="asunto" class="form-label fw-semibold">Asunto</label>
              <div class="input-group">
                <span class="input-group-text">
                  <i class="fa-solid fa-pencil"></i>
                </span>
                <input
                  type="text"
                  class="form-control"
                  id="asunto"
                  placeholder="Motivo de su mensaje"
                />
              </div>
            </div>

            <!-- Mensaje -->
            <div class="mb-4">
              <label for="mensaje" class="form-label fw-semibold">Mensaje</label>
              <textarea
                class="form-control textarea-msg"
                id="mensaje"
                placeholder="Escriba su mensaje aquí..."
              ></textarea>
            </div>

            <!-- Botón Enviar -->
            <div class="d-grid">
              <button type="submit" class="btn btn-send fw-bold">Enviar</button>
            </div>

          </form>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer-bar d-flex align-items-center justify-content-between px-4">
      <span class="footer-brand fw-semibold fst-italic">2077 Empresa SA</span>
      <div class="footer-icons d-flex gap-3">
        <a href="#" class="footer-icon" aria-label="Instagram">
          <i class="fa-brands fa-instagram"></i>
        </a>
        <a href="#" class="footer-icon" aria-label="Facebook">
          <i class="fa-brands fa-facebook-f"></i>
        </a>
        <a href="#" class="footer-icon" aria-label="X (Twitter)">
          <i class="fa-brands fa-x-twitter"></i>
        </a>
      </div>
    </footer>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
